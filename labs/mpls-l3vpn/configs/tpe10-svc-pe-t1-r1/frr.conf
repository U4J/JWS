frr version 10.6.1
frr defaults traditional
hostname tpe10-svc-pe-t1-r1
log stdout informational
service integrated-vtysh-config
!
vrf BLUE
exit-vrf
!
vrf GREEN
exit-vrf
!
interface lo
 ip address 10.255.100.1/32
 ip ospf area 0.0.0.0
 ip ospf passive
!
interface eth1
 description TPE10-SVC-P-T1-R1
 ip address 10.100.0.0/31
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
!
interface eth2 vrf BLUE
 description CE-BLUE-A
 ip address 192.0.2.1/30
!
interface eth3 vrf GREEN
 description CE-GREEN-A
 ip address 192.0.2.1/30
!
router ospf
 ospf router-id 10.255.100.1
!
mpls ldp
 router-id 10.255.100.1
 !
 address-family ipv4
  discovery transport-address 10.255.100.1
  !
  interface eth1
  !
 exit-address-family
!
router bgp 205013
 bgp router-id 10.255.100.1
 no bgp default ipv4-unicast
 neighbor 10.255.100.3 remote-as internal
 neighbor 10.255.100.3 update-source lo
 !
 address-family ipv4 vpn
  neighbor 10.255.100.3 activate
 exit-address-family
!
router bgp 205013 vrf BLUE
 bgp router-id 10.255.100.1
 !
 address-family ipv4 unicast
  redistribute connected
  rd vpn export 205013:1001
  rt vpn both 205013:100
  label vpn export auto
  export vpn
  import vpn
 exit-address-family
!
router bgp 205013 vrf GREEN
 bgp router-id 10.255.100.1
 !
 address-family ipv4 unicast
  redistribute connected
  rd vpn export 205013:2001
  rt vpn both 205013:200
  label vpn export auto
  export vpn
  import vpn
 exit-address-family
!
