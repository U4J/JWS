name: mpls-l3vpn

mgmt:
  network: mpls-l3vpn-mgmt
  ipv4-subnet: 172.31.254.0/24

topology:
  groups:
    pe:
      kind: linux
      image: quay.io/frrouting/frr:10.6.1
      sysctls:
        net.ipv4.ip_forward: 1
        net.ipv4.conf.all.rp_filter: 0
        net.ipv4.conf.default.rp_filter: 0
        net.mpls.platform_labels: 1048575
        net.mpls.conf.lo.input: 1
        net.mpls.conf.eth1.input: 1
      binds:
        - configs/__clabNodeName__/frr.conf:/etc/frr/frr.conf:ro
        - configs/daemons-pe:/etc/frr/daemons:ro
        - configs/vtysh.conf:/etc/frr/vtysh.conf:ro
      exec:
        - ip link add BLUE type vrf table 1001
        - ip link add GREEN type vrf table 1002
        - ip link set BLUE up
        - ip link set GREEN up
        - ip route add table 1001 unreachable default metric 4278198272
        - ip route add table 1002 unreachable default metric 4278198272
        - ip link set eth2 master BLUE
        - ip link set eth3 master GREEN
        # FRR starts before the Linux VRFs are created; reapply the boot
        # configuration after the customer interfaces enter their VRFs.
        - vtysh -b
    p:
      kind: linux
      image: quay.io/frrouting/frr:10.6.1
      sysctls:
        net.ipv4.ip_forward: 1
        net.ipv4.conf.all.rp_filter: 0
        net.ipv4.conf.default.rp_filter: 0
        net.mpls.platform_labels: 1048575
        net.mpls.conf.lo.input: 1
        net.mpls.conf.eth1.input: 1
        net.mpls.conf.eth2.input: 1
      binds:
        - configs/__clabNodeName__/frr.conf:/etc/frr/frr.conf:ro
        - configs/daemons-p:/etc/frr/daemons:ro
        - configs/vtysh.conf:/etc/frr/vtysh.conf:ro
    ce:
      kind: linux
      image: quay.io/frrouting/frr:10.6.1
      sysctls:
        net.ipv4.ip_forward: 1
        net.ipv4.conf.all.rp_filter: 0
        net.ipv4.conf.default.rp_filter: 0
      binds:
        - configs/__clabNodeName__/frr.conf:/etc/frr/frr.conf:ro
        - configs/daemons-ce:/etc/frr/daemons:ro
        - configs/vtysh.conf:/etc/frr/vtysh.conf:ro

  nodes:
    tpe10-svc-pe-t1-r1:
      group: pe
      mgmt-ipv4: 172.31.254.11
    tpe10-svc-p-t1-r1:
      group: p
      mgmt-ipv4: 172.31.254.12
    tpe10-svc-pe-t1-r2:
      group: pe
      mgmt-ipv4: 172.31.254.13
    ce-blue-a:
      group: ce
      mgmt-ipv4: 172.31.254.21
    ce-blue-b:
      group: ce
      mgmt-ipv4: 172.31.254.22
    ce-green-a:
      group: ce
      mgmt-ipv4: 172.31.254.23
    ce-green-b:
      group: ce
      mgmt-ipv4: 172.31.254.24

  links:
    # MPLS provider transport
    - endpoints: ["tpe10-svc-pe-t1-r1:eth1", "tpe10-svc-p-t1-r1:eth1"]
    - endpoints: ["tpe10-svc-p-t1-r1:eth2", "tpe10-svc-pe-t1-r2:eth1"]

    # BLUE and GREEN deliberately use overlapping customer addresses.
    - endpoints: ["tpe10-svc-pe-t1-r1:eth2", "ce-blue-a:eth1"]
    - endpoints: ["tpe10-svc-pe-t1-r2:eth2", "ce-blue-b:eth1"]
    - endpoints: ["tpe10-svc-pe-t1-r1:eth3", "ce-green-a:eth1"]
    - endpoints: ["tpe10-svc-pe-t1-r2:eth3", "ce-green-b:eth1"]
