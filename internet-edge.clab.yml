name: internet-edge

topology:
  groups:
    frr:
      kind: linux
      image: quay.io/frrouting/frr:10.6.1
      sysctls:
        net.ipv4.ip_forward: 1
        net.ipv6.conf.all.forwarding: 1
      binds:
        - configs/__clabNodeName__/frr.conf:/etc/frr/frr.conf:ro
        - configs/daemons:/etc/frr/daemons:ro
      exec:
        # Keep Docker management connected routes, but force lab traffic onto
        # the OSPF/BGP data plane.
        - ip route del default dev eth0
        - ip -6 route del default dev eth0

  nodes:
    edge1:
      group: frr
    edge2:
      group: frr
    core1:
      group: frr
    core2:
      group: frr
    service:
      group: frr
    transit-a:
      group: frr
    transit-b:
      group: frr

  links:
    # ISP backbone
    - endpoints: ["edge1:eth1", "core1:eth1"]
    - endpoints: ["edge1:eth2", "core2:eth1"]
    - endpoints: ["edge2:eth1", "core1:eth2"]
    - endpoints: ["edge2:eth2", "core2:eth2"]
    # No direct edge1-edge2 circuit: RR loopback sessions traverse the cores.
    - endpoints: ["core1:eth3", "core2:eth3"]
    - endpoints: ["core1:eth4", "service:eth1"]
    - endpoints: ["core2:eth4", "service:eth2"]

    # External transit circuits
    - endpoints: ["edge1:eth3", "transit-a:eth1"]
    - endpoints: ["edge2:eth3", "transit-b:eth1"]
