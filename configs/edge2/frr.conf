frr version 10.6.1
frr defaults traditional
hostname edge2
log stdout informational
service integrated-vtysh-config
!
interface lo
 ip address 10.255.0.2/32
 ipv6 address fd00:6500::2/128
 ip ospf area 0.0.0.0
 ip ospf passive
 ipv6 ospf6 area 0.0.0.0
 ipv6 ospf6 passive
!
interface eth1
 description CORE1
 ip address 10.0.0.4/31
 ipv6 address fd00:6500:0:3::/127
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
 ipv6 ospf6 area 0.0.0.0
 ipv6 ospf6 network point-to-point
!
interface eth2
 description CORE2
 ip address 10.0.0.6/31
 ipv6 address fd00:6500:0:4::/127
 ip ospf area 0.0.0.0
 ip ospf network point-to-point
 ipv6 ospf6 area 0.0.0.0
 ipv6 ospf6 network point-to-point
!
interface eth3
 description TRANSIT-B
 ip address 172.16.0.6/31
 ipv6 address 2001:db8:ff:4::/127
!
ip route 203.0.113.0/24 Null0
ipv6 route 2001:db8:6500::/48 Null0
!
ip prefix-list ISP-V4-OUT seq 10 permit 203.0.113.0/24
ip prefix-list TRANSIT-V4-IN seq 5 deny 10.0.0.0/8 le 32
ip prefix-list TRANSIT-V4-IN seq 10 deny 172.16.0.0/12 le 32
ip prefix-list TRANSIT-V4-IN seq 15 deny 192.168.0.0/16 le 32
ip prefix-list TRANSIT-V4-IN seq 20 permit 0.0.0.0/0
ip prefix-list TRANSIT-V4-IN seq 30 permit 11.11.0.0/16
ip prefix-list TRANSIT-V4-IN seq 40 permit 22.22.0.0/16
ipv6 prefix-list ISP-V6-OUT seq 10 permit 2001:db8:6500::/48
ipv6 prefix-list TRANSIT-V6-IN seq 5 deny fc00::/7 le 128
ipv6 prefix-list TRANSIT-V6-IN seq 10 permit ::/0
ipv6 prefix-list TRANSIT-V6-IN seq 20 permit 2001:db8:6510::/48
ipv6 prefix-list TRANSIT-V6-IN seq 30 permit 2001:db8:6520::/48
!
bgp as-path access-list PUBLIC-ASN-ONLY seq 5 deny _(6451[2-9]|645[2-9][0-9]|64[6-9][0-9][0-9]|65[0-4][0-9][0-9]|655[0-2][0-9]|6553[0-4])_
bgp as-path access-list PUBLIC-ASN-ONLY seq 10 deny _(42[0-8][0-9][0-9][0-9][0-9][0-9][0-9][0-9]|429[0-3][0-9][0-9][0-9][0-9][0-9][0-9]|4294[0-8][0-9][0-9][0-9][0-9][0-9]|42949[0-5][0-9][0-9][0-9][0-9]|429496[0-6][0-9][0-9][0-9]|4294967[01][0-9][0-9]|42949672[0-8][0-9]|429496729[0-4])_
bgp as-path access-list PUBLIC-ASN-ONLY seq 100 permit .*
!
route-map TRANSIT-B-IN permit 10
 set local-preference 200
!
route-map TO-TRANSIT-B permit 10
 set metric 0
!
router ospf
 ospf router-id 10.255.0.2
 default-information originate always metric 10
!
router ospf6
 ospf6 router-id 10.255.0.2
 default-information originate always metric 10
!
router bgp 205013
 bgp router-id 10.255.0.2
 no bgp default ipv4-unicast
 neighbor 10.255.0.21 remote-as internal
 neighbor 10.255.0.21 description RR1
 neighbor 10.255.0.21 update-source lo
 neighbor 10.255.0.22 remote-as internal
 neighbor 10.255.0.22 description RR2
 neighbor 10.255.0.22 update-source lo
 neighbor fd00:6500::21 remote-as internal
 neighbor fd00:6500::21 description RR1-V6
 neighbor fd00:6500::21 update-source lo
 neighbor fd00:6500::22 remote-as internal
 neighbor fd00:6500::22 description RR2-V6
 neighbor fd00:6500::22 update-source lo
 neighbor 172.16.0.7 remote-as 2222
 neighbor 172.16.0.7 description TRANSIT-B
 neighbor 172.16.0.7 bfd
 neighbor 2001:db8:ff:4::1 remote-as 2222
 neighbor 2001:db8:ff:4::1 description TRANSIT-B-V6
 neighbor 2001:db8:ff:4::1 bfd
 !
 address-family ipv4 unicast
  network 203.0.113.0/24
  neighbor 10.255.0.21 activate
  neighbor 10.255.0.21 next-hop-self
  neighbor 10.255.0.22 activate
  neighbor 10.255.0.22 next-hop-self
  neighbor 172.16.0.7 activate
  neighbor 172.16.0.7 prefix-list TRANSIT-V4-IN in
  neighbor 172.16.0.7 filter-list PUBLIC-ASN-ONLY in
  neighbor 172.16.0.7 prefix-list ISP-V4-OUT out
  neighbor 172.16.0.7 route-map TRANSIT-B-IN in
  neighbor 172.16.0.7 route-map TO-TRANSIT-B out
  neighbor 172.16.0.7 maximum-prefix 10
 exit-address-family
 !
 address-family ipv6 unicast
  network 2001:db8:6500::/48
  neighbor fd00:6500::21 activate
  neighbor fd00:6500::21 next-hop-self
  neighbor fd00:6500::22 activate
  neighbor fd00:6500::22 next-hop-self
  neighbor 2001:db8:ff:4::1 activate
  neighbor 2001:db8:ff:4::1 prefix-list TRANSIT-V6-IN in
  neighbor 2001:db8:ff:4::1 filter-list PUBLIC-ASN-ONLY in
  neighbor 2001:db8:ff:4::1 prefix-list ISP-V6-OUT out
  neighbor 2001:db8:ff:4::1 route-map TRANSIT-B-IN in
  neighbor 2001:db8:ff:4::1 route-map TO-TRANSIT-B out
  neighbor 2001:db8:ff:4::1 maximum-prefix 10
 exit-address-family
!
